    <style>
        :root {
            --terminal-color: #33ff00;
            --bg-color: #0a0a0a;
            --glow-color: rgba(51, 255, 0, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--terminal-color);
            font-family: 'Share Tech Mono', monospace;
            min-height: 100vh;
            font-size: 1.1rem;
            position: relative;
            padding: 20px;
            overflow-y: auto;
            text-shadow: 0 0 5px var(--glow-color);
        }

        /* CRT Screen Effect Overlay */
        .crt-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 3px;
            pointer-events: none;
            z-index: 10;
            animation: flicker 0.03s infinite;
        }

        /* Scanline animation */
        .crt-overlay::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0),
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 0, 0, 0.2) 50%,
                rgba(0, 0, 0, 0.2)
            );
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
            animation: scanlines 0.5s linear infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.97; }
            50% { opacity: 1; }
            100% { opacity: 0.97; }
        }

        @keyframes scanlines {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }

        /* Screen curvature effect */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 11;
        }

        /* Text glow animation */
        @keyframes textGlow {
            0%, 100% { text-shadow: 0 0 5px var(--glow-color), 0 0 10px var(--glow-color); }
            50% { text-shadow: 0 0 8px var(--glow-color), 0 0 15px var(--glow-color), 0 0 20px var(--glow-color); }
        }

        .terminal-container {
            animation: textGlow 3s ease-in-out infinite;
        }

        /* Main Container */
        .terminal-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            padding: 10px;
            padding-bottom: 100px;
        }

        /* Header Section */
        .header {
            margin-bottom: 20px;
            text-align: left;
            text-transform: uppercase;
            font-size: 1rem;
            line-height: 1.4;
        }

        /* Boot Text Area */
        #boot-sequence {
            margin-bottom: 20px;
            white-space: pre-wrap;
            text-align: left;
        }

        /* Menu Area */
        #main-menu {
            display: none;
            border-top: 1px solid var(--terminal-color);
            padding-top: 15px;
            text-align: left;
        }

        .menu-title {
            text-align: left;
            margin-bottom: 15px;
            font-size: 1.2rem;
        }

        .button-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: left;
        }

        .dos-btn {
            background: transparent;
            border: 1px solid var(--terminal-color);
            color: var(--terminal-color);
            padding: 12px 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.1s;
            text-decoration: none;
            display: inline-block;
            width: fit-content;
            min-width: 200px;
        }

        .dos-btn:hover {
            background: var(--terminal-color);
            color: #000;
            box-shadow: 0 0 15px var(--glow-color);
        }

        .dos-btn:active {
            transform: scale(0.98);
        }

        /* Blinking Cursor */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: var(--terminal-color);
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            box-shadow: 0 0 10px var(--glow-color);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .admin-line {
            margin-top: 30px;
            border-top: 1px solid var(--terminal-color);
            padding-top: 10px;
        }

        .prompt {
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .dos-btn {
                width: 100%;
                min-width: auto;
            }
            
            body {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="crt-overlay"></div>

    <div class="terminal-container">
        <header class="header">
             Console.dan1e.gkt [V2]<br>

        </header>

        <div id="boot-sequence"></div>

        <!-- Hidden Easter Egg Message -->
        <div id="easter-egg-message" style="display: none; text-align: center; margin: 30px 0; font-size: 2rem;">

        <div id="main-menu">

            <div class="button-list">

                    ИНСТРУКЦИЯ ПО ИЗМЕНЕНИЮ ССЫЛОК:

                <!-- Кнопка 1: YouTube -->

                <!-- Кнопка 2: Twitch -->

            C:\USR><span class="cursor"></span>
        </div>

        <!-- Hidden input for easter egg -->
        <input type="text" id="secret-input" style="position: absolute; opacity: 0; pointer-events: none;" autocomplete="off">
    </div>

    <script>
        const bootText = [
            "Microsoft(R) MS-DOS(R) Version 6.22",
            "(C)Copyright Microsoft Corp 1981-2003.",
            "",
            "C:\\>DIR",
            " Volume in drive C is SYSTEM",
            " Directory of C:\\usr",
            "",
            "CONTROL    EXE     45,056  01-15-24  8:00a",
            "CONFIG     SYS        256  01-15-24  8:00a",
            "AUTOEXEC   BAT        128  01-15-24  8:00a",
            "README     TXT      1,024  01-15-24  8:00a",
            "        4 file(s)     46,464 bytes",
            "        0 dir(s)   524,288 bytes free",
            "",
            "C:\\System39>CONTROL.EXE",
            "Loading...",
            "Initializing modules...",
            "Loading video drivers... OK",
            "Loading audio drivers... OK",
            "Connecting to network... OK",
            "Включение русского языка... OK",
            "",
            "",
            "Ожидание действия. Выберите нужную кнопку."
        ];

        const bootContainer = document.getElementById('boot-sequence');
        const mainMenu = document.getElementById('main-menu');
        
        let lineIndex = 0;

        // Появление текста построчно (быстро)
        function showLine() {
            if (lineIndex < bootText.length) {
                const newLine = document.createElement('div');
                newLine.id = `line-${lineIndex}`;
                newLine.textContent = bootText[lineIndex];
                bootContainer.appendChild(newLine);
                
                lineIndex++;
                
                // Быстрая задержка между строками (50-150мс)
                setTimeout(showLine, Math.random() * 100 + 50);
            } else {
                // Всё напечатано, показываем меню
                setTimeout(showMenu, 300);
            }
        }

        function showMenu() {
            mainMenu.style.display = 'block';
            // Прокрутка к меню после появления кнопок
            setTimeout(() => {
                mainMenu.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 100);
        }

        window.onload = () => {
            setTimeout(showLine, 200);
        };

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            const buttons = document.querySelectorAll('.dos-btn');
            if (e.key === '1') buttons[0]?.click();
            if (e.key === '2') buttons[1]?.click();
            if (e.key === '3') buttons[2]?.click();
            if (e.key === '4') buttons[3]?.click();
        });

        // Easter Egg: IDT -> Heart
        const secretInput = document.getElementById('secret-input');
        const easterEggMessage = document.getElementById('easter-egg-message');
        let secretCode = '';
        const secretPhrase = 'IDT';

        // Focus hidden input on any keypress to capture typing
        document.addEventListener('keydown', (e) => {
            if (e.key.length === 1 && !e.ctrlKey && !e.altKey && !e.metaKey) {
                secretInput.focus();
            }
        });

        // Listen for input in the hidden field
        secretInput.addEventListener('input', (e) => {
            secretCode += e.data || '';
            secretCode = secretCode.toUpperCase().slice(-10); // Keep last 10 chars
            
            if (secretCode.includes(secretPhrase)) {
                easterEggMessage.style.display = 'block';
                easterEggMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
                
                // Hide after 5 seconds
                setTimeout(() => {
                    easterEggMessage.style.display = 'none';
                }, 5000);
                
                secretCode = '';
                secretInput.value = '';
            }
        });

        // Clear code on Enter or Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === 'Escape') {
                secretCode = '';
                secretInput.value = '';
            }
        });
    </script>
